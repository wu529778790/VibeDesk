# VibeDesk TURN Server Configuration
# Replace values marked with <...> before deploying

# Network
listening-port=3478
tls-listening-port=5349
relay-ports=49152-49200

# External IP — set to your server's public IP
external-ip=<YOUR_PUBLIC_IP>

# Realm
realm=vibedesk.app

# Authentication (long-term credential mechanism)
lt-cred-mech
user=vibedesk:<GENERATED_SECRET>

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
fingerprint

# TLS (uncomment after adding certs)
# cert=/etc/ssl/certs/turn.crt
# pkey=/etc/ssl/private/turn.key
