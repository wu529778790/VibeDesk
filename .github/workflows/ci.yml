name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  signal-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/signal-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
